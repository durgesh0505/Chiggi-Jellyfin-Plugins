name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Build & Attach to Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore Chiggi.Jellyfin.Plugins.sln

      - name: Publish ChiggiStats
        run: |
          dotnet publish src/Jellyfin.Plugin.ChiggiStats/Jellyfin.Plugin.ChiggiStats.csproj \
            --no-restore --configuration Release \
            --output artifacts/ChiggiStats

      - name: Publish Trakt
        run: |
          dotnet publish src/Jellyfin.Plugin.Trakt/Jellyfin.Plugin.Trakt.csproj \
            --no-restore --configuration Release \
            --output artifacts/Trakt

      - name: Package plugins
        run: |
          mkdir -p releases
          cd artifacts/ChiggiStats && zip -r ../../releases/Jellyfin.Plugin.ChiggiStats.zip . && cd ../..
          cd artifacts/Trakt       && zip -r ../../releases/Jellyfin.Plugin.Trakt.zip .       && cd ../..
          md5sum releases/Jellyfin.Plugin.ChiggiStats.zip | awk '{print $1}' > releases/ChiggiStats.md5
          md5sum releases/Jellyfin.Plugin.Trakt.zip       | awk '{print $1}' > releases/Trakt.md5

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/Jellyfin.Plugin.ChiggiStats.zip
            releases/Jellyfin.Plugin.Trakt.zip
            releases/ChiggiStats.md5
            releases/Trakt.md5

      - name: Print checksums for manifest update
        run: |
          STATS_MD5=$(cat releases/ChiggiStats.md5)
          TRAKT_MD5=$(cat releases/Trakt.md5)
          echo "ChiggiStats MD5: $STATS_MD5"
          echo "Trakt MD5: $TRAKT_MD5"
