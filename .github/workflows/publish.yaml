name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Build & Attach to Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore Chiggi.Jellyfin.Plugins.sln

      - name: Publish ChiggiStats
        run: |
          dotnet publish src/Jellyfin.Plugin.ChiggiStats/Jellyfin.Plugin.ChiggiStats.csproj \
            --no-restore --configuration Release \
            --output artifacts/ChiggiStats

      - name: Publish Trakt
        run: |
          dotnet publish src/Jellyfin.Plugin.Trakt/Jellyfin.Plugin.Trakt.csproj \
            --no-restore --configuration Release \
            --output artifacts/Trakt

      - name: Package plugins
        run: |
          mkdir -p releases
          cd artifacts/ChiggiStats && zip -r ../../releases/Jellyfin.Plugin.ChiggiStats.zip . && cd ../..
          cd artifacts/Trakt       && zip -r ../../releases/Jellyfin.Plugin.Trakt.zip .       && cd ../..

      - name: Update manifest.json checksums
        run: |
          TAG="${{ github.ref_name }}"
          # Fall back to a manual tag input when triggered via workflow_dispatch
          if [ -z "$TAG" ] || [ "$TAG" = "refs/heads/main" ]; then
            echo "No release tag found — skipping manifest update"
            exit 0
          fi

          STATS_MD5=$(md5sum releases/Jellyfin.Plugin.ChiggiStats.zip | awk '{print $1}')
          TRAKT_MD5=$(md5sum releases/Jellyfin.Plugin.Trakt.zip       | awk '{print $1}')
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Tag:        $TAG"
          echo "Stats MD5:  $STATS_MD5"
          echo "Trakt MD5:  $TRAKT_MD5"

          jq --arg tag       "$TAG" \
             --arg stats_md5 "$STATS_MD5" \
             --arg trakt_md5 "$TRAKT_MD5" \
             --arg now       "$NOW" \
             '
             map(
               if .name == "Chiggi Stats" then
                 .versions[0].checksum   = $stats_md5 |
                 .versions[0].sourceUrl  = "https://github.com/durgesh0505/Chiggi-Jellyfin-Plugins/releases/download/" + $tag + "/Jellyfin.Plugin.ChiggiStats.zip" |
                 .versions[0].timestamp  = $now
               elif .name == "Trakt" then
                 .versions[0].checksum   = $trakt_md5 |
                 .versions[0].sourceUrl  = "https://github.com/durgesh0505/Chiggi-Jellyfin-Plugins/releases/download/" + $tag + "/Jellyfin.Plugin.Trakt.zip" |
                 .versions[0].timestamp  = $now
               else . end
             )
             ' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Commit and push updated manifest.json
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "refs/heads/main" ]; then
            echo "Skipping manifest commit — no release tag"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet && echo "manifest.json unchanged, nothing to commit" && exit 0
          git commit -m "chore: update manifest.json checksums for $TAG"
          git push origin HEAD:main

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/Jellyfin.Plugin.ChiggiStats.zip
            releases/Jellyfin.Plugin.Trakt.zip
