<div id="chiggiStatsPage"
    data-role="page"
    class="page type-interior pluginConfigurationPage withTabs chiggiStatsPage"
    data-require="emby-button,emby-select,emby-input"
    data-controller="__plugin/chiggistatsjs">
    <style>
        .chiggiStatsPage .cs-hidden {
            display: none;
        }

        .chiggiStatsPage .cs-tabBar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0 24px;
        }

        .chiggiStatsPage .cs-tabButton {
            margin: 0;
            min-width: 0;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            background: transparent;
            color: inherit;
            cursor: pointer;
            font-size: inherit;
        }

        .chiggiStatsPage .cs-tabButton-active {
            background: var(--theme-primary-color, #00a4dc) !important;
            color: #fff !important;
            border-color: transparent !important;
        }

        .chiggiStatsPage .cs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .chiggiStatsPage .cs-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 18px;
        }

        .chiggiStatsPage .cs-card-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--theme-primary-color, #00a4dc);
        }

        .chiggiStatsPage .cs-card-label {
            display: block;
            margin-top: 6px;
            font-size: 0.9em;
            opacity: 0.72;
        }

        .chiggiStatsPage .cs-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin: 12px 0 24px;
        }

        .chiggiStatsPage .cs-filterField {
            min-width: 170px;
        }

        .chiggiStatsPage .cs-section {
            margin-top: 28px;
        }

        .chiggiStatsPage .cs-sectionTitle {
            margin: 0 0 12px;
        }

        .chiggiStatsPage .cs-trendBars {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(36px, 1fr));
            gap: 10px;
            align-items: end;
            min-height: 240px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .chiggiStatsPage .cs-trendBarWrap {
            display: flex;
            flex-direction: column;
            justify-content: end;
            align-items: center;
            gap: 8px;
            min-height: 208px;
        }

        .chiggiStatsPage .cs-trendBar {
            width: 100%;
            min-height: 8px;
            border-radius: 999px 999px 0 0;
            background: linear-gradient(180deg, rgba(0, 164, 220, 0.9), rgba(0, 164, 220, 0.45));
        }

        .chiggiStatsPage .cs-trendValue,
        .chiggiStatsPage .cs-trendLabel {
            font-size: 0.75em;
            opacity: 0.75;
            text-align: center;
        }

        .chiggiStatsPage .detailTable {
            width: 100%;
        }

        .chiggiStatsPage .cs-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            font-size: 0.8em;
        }

        .chiggiStatsPage .cs-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            background: transparent;
            color: inherit;
            cursor: pointer;
            font-size: inherit;
        }

        .chiggiStatsPage .cs-btn-primary {
            background: var(--theme-primary-color, #00a4dc);
            color: #fff;
            border-color: transparent;
        }

        .chiggiStatsPage .cs-pagination {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
        }

        .chiggiStatsPage .cs-empty {
            padding: 32px 16px;
            text-align: center;
            opacity: 0.6;
        }
    </style>
    <div data-role="content">
        <div class="content-primary">
            <div class="verticalSection">
                <h1>Chiggi Stats</h1>
                <div class="cs-tabBar" id="csTabBar">
                    <button type="button" class="cs-tabButton cs-tabButton-active" data-tab="overview">Overview</button>
                    <button type="button" class="cs-tabButton" data-tab="playback">Playback</button>
                    <button type="button" class="cs-tabButton cs-hidden" data-tab="movies" data-admin-only="true">Movies</button>
                    <button type="button" class="cs-tabButton cs-hidden" data-tab="series" data-admin-only="true">Series</button>
                    <button type="button" class="cs-tabButton cs-hidden" data-tab="seasons" data-admin-only="true">Seasons</button>
                    <button type="button" class="cs-tabButton cs-hidden" data-tab="episodes" data-admin-only="true">Episodes</button>
                    <button type="button" class="cs-tabButton cs-hidden" data-tab="music" data-admin-only="true">Music</button>
                    <button type="button" class="cs-tabButton cs-hidden" data-tab="boxsets" data-admin-only="true">Box Sets</button>
                    <button type="button" class="cs-tabButton cs-hidden" data-tab="users" data-admin-only="true">Users</button>
                    <button type="button" class="cs-tabButton cs-hidden" data-tab="devices" data-admin-only="true">Devices</button>
                    <a id="csSettingsLink" class="cs-tabButton button-link emby-button cs-hidden" href="#/configurationpage?name=Chiggi%20Stats" data-admin-only="true">Settings</a>
                </div>
            </div>

            <div id="csPlaybackFilters" class="verticalSection">
                <div class="cs-filters">
                    <div id="csUserFilter" class="cs-filterField cs-hidden">
                        <label class="inputLabel" for="csUserSelect">User</label>
                        <select is="emby-select" id="csUserSelect"></select>
                    </div>
                    <div class="cs-filterField">
                        <label class="inputLabel" for="csMediaTypeSelect">Media Type</label>
                        <select is="emby-select" id="csMediaTypeSelect">
                            <option value="">All</option>
                            <option value="Movie">Movies</option>
                            <option value="Episode">Episodes</option>
                            <option value="Audio">Music</option>
                        </select>
                    </div>
                    <div class="cs-filterField">
                        <label class="inputLabel" for="csStartDate">From</label>
                        <input is="emby-input" id="csStartDate" type="date" />
                    </div>
                    <div class="cs-filterField">
                        <label class="inputLabel" for="csEndDate">To</label>
                        <input is="emby-input" id="csEndDate" type="date" />
                    </div>
                    <div>
                        <button type="button" id="csApplyFilters" class="cs-btn cs-btn-primary">Apply</button>
                    </div>
                    <div>
                        <button type="button" id="csResetFilters" class="cs-btn">Reset</button>
                    </div>
                </div>
            </div>

            <div id="csOverviewSection">
                <div id="csOverviewMetrics" class="cs-grid"></div>

                <div class="cs-section">
                    <h2 class="cs-sectionTitle">Playback Trend</h2>
                    <div id="csTrendBars" class="cs-trendBars"></div>
                </div>

                <div class="cs-section">
                    <h2 class="cs-sectionTitle">Most Watched</h2>
                    <table class="detailTable">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Type</th>
                                <th>Plays</th>
                                <th>Total Time</th>
                            </tr>
                        </thead>
                        <tbody id="csTopItemsBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="csPlaybackSection" class="cs-hidden">
                <div class="cs-section">
                    <h2 class="cs-sectionTitle">Recent Activity</h2>
                    <table class="detailTable">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Title</th>
                                <th>Type</th>
                                <th>Duration</th>
                                <th>Date</th>
                                <th>Client</th>
                            </tr>
                        </thead>
                        <tbody id="csActivityBody"></tbody>
                    </table>
                    <div class="cs-pagination">
                        <button type="button" id="csPlaybackPrev" class="cs-btn">Prev</button>
                        <span id="csPlaybackPageInfo" class="cs-pill"></span>
                        <button type="button" id="csPlaybackNext" class="cs-btn">Next</button>
                    </div>
                </div>
            </div>

            <div id="csReportSection" class="cs-hidden">
                <div class="cs-section">
                    <h2 id="csReportHeading" class="cs-sectionTitle">Report</h2>
                    <div id="csReportSummary" class="fieldDescription"></div>
                    <table class="detailTable">
                        <thead id="csReportHead"></thead>
                        <tbody id="csReportBody"></tbody>
                    </table>
                    <div class="cs-pagination">
                        <button type="button" id="csReportPrev" class="cs-btn">Prev</button>
                        <span id="csReportPageInfo" class="cs-pill"></span>
                        <button type="button" id="csReportNext" class="cs-btn">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
